services:
  - type: web
    name: neuroscan
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.9.0
buildCommand: |
  apt-get update && apt-get install -y cmake build-essential
  pip install --upgrade pip
  pip install -r requirements.txt
