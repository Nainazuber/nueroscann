{% extends "base.html" %}

{% block title %}Login - NeuroFace Analyzer{% endblock %}

{% block content %}
<div class="card auth-card">
    <h1 style="text-align: center; color: var(--primary-color); margin-bottom: 2rem;">
        <i class="fas fa-sign-in-alt"></i> Welcome Back
    </h1>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="email">
                <i class="fas fa-envelope"></i> Email Address
            </label>
            <input type="email" id="email" name="email" required 
                   placeholder="Enter your email" class="form-control"
                   value="{{ request.form.email if request.form else '' }}">
        </div>
        
        <div class="form-group">
            <label for="password">
                <i class="fas fa-lock"></i> Password
            </label>
            <input type="password" id="password" name="password" required 
                   placeholder="Enter your password" class="form-control">
            <div style="text-align: right; margin-top: 0.5rem;">
                <a href="#" style="font-size: 0.9rem; color: var(--primary-color);">
                    Forgot Password?
                </a>
            </div>
        </div>
        
        <div class="form-check" style="margin: 1.5rem 0;">
            <input type="checkbox" id="remember" name="remember" class="form-check-input">
            <label for="remember" class="form-check-label">
                Remember me
            </label>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
        
        <div style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #e9ecef;">
            <p>Don't have an account? 
                <a href="{{ url_for('register') }}" style="color: var(--primary-color); font-weight: 600;">
                    Create Account
                </a>
            </p>
        </div>
    </form>
</div>

<div class="card" style="max-width: 500px; margin: 2rem auto; text-align: center;">
    <h3 style="color: var(--primary-color); margin-bottom: 1rem;">
        <i class="fas fa-question-circle"></i> Need Help?
    </h3>
    <p style="color: var(--gray-color); margin-bottom: 1rem;">
        If you're having trouble logging in, please contact our support team.
    </p>
    <a href="mailto:support@neuroface.com" class="btn btn-secondary">
        <i class="fas fa-envelope"></i> Contact Support
    </a>
</div>

<style>
.auth-card {
    max-width: 500px;
    margin: 2rem auto;
    padding: 2.5rem;
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: var(--dark-color);
}

.form-group label i {
    margin-right: 0.5rem;
    color: var(--primary-color);
}

.form-control {
    width: 100%;
    padding: 0.75rem;
    border: 2px solid #e9ecef;
    border-radius: 8px;
    font-size: 1rem;
    transition: border-color 0.3s;
}

.form-control:focus {
    outline: none;
    border-color: var(--primary-color);
}

.form-control::placeholder {
    color: #adb5bd;
}

.btn-block {
    width: 100%;
    padding: 0.75rem;
    font-size: 1.1rem;
}

@media (max-width: 768px) {
    .auth-card {
        margin: 1rem;
        padding: 1.5rem;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Add animation to form
    const form = document.querySelector('form');
    form.style.opacity = '0';
    form.style.transform = 'translateY(20px)';
    
    setTimeout(() => {
        form.style.transition = 'all 0.5s ease';
        form.style.opacity = '1';
        form.style.transform = 'translateY(0)';
    }, 100);
    
    // Show password toggle (optional feature)
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.createElement('button');
    toggleBtn.type = 'button';
    toggleBtn.innerHTML = '<i class="fas fa-eye"></i>';
    toggleBtn.style.cssText = `
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--gray-color);
        cursor: pointer;
    `;
    
    passwordInput.parentNode.style.position = 'relative';
    passwordInput.parentNode.appendChild(toggleBtn);
    
    toggleBtn.addEventListener('click', function() {
        const type = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = type;
        this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
    });
});
</script>
{% endblock %}
